<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>History</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f7f7f7}
        .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06);max-width:800px;margin:12px auto}
        h1{margin:0 0 12px 0}
        table{width:100%;border-collapse:collapse}
        td,th{padding:8px;border-bottom:1px solid #eee;text-align:left}
        a{color:#2c3e50;text-decoration:none}
    </style>
</head>
<body>
    <div class="card">
        <h1>Focus History</h1>
        <p><a href="/">Back to Today</a></p>
        <table>
            <thead>
                <tr><th>Date</th><th>Total Focus</th><th></th></tr>
            </thead>
            <tbody>
            {% for row in summary %}
                <tr>
                    <td>{{ row.date }}</td>
                    <td>{{ row.fmt }}</td>
                    <td><a href="/history/{{ row.date }}">Details</a></td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
