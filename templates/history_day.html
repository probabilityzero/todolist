<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>History - {{ date }}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body{font-family:Arial,Helvetica,sans-serif;padding:24px;background:#f7f7f7}
        .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.06);max-width:800px;margin:12px auto}
        h1{margin:0 0 12px 0}
        table{width:100%;border-collapse:collapse}
        td,th{padding:8px;border-bottom:1px solid #eee;text-align:left}
        a{color:#2c3e50;text-decoration:none}
        .muted{color:#666;font-size:.9rem}
    </style>
</head>
<body>
    <div class="card">
        <h1>Sessions for {{ date }}</h1>
        <p><a href="/history">Back to History</a> · <a href="/">Home</a></p>
        <p class="muted">Total focused: {{ fmt_total }}</p>
        <table>
            <thead>
                <tr><th>Start</th><th>End</th><th>Duration</th><th>Type</th><th>Mode</th></tr>
            </thead>
            <tbody>
            {% for s in sessions %}
                <tr>
                    <td>{{ s.start }}</td>
                    <td>{{ s.end }}</td>
                    <td>{{ s.fmt }}</td>
                    <td>{{ s.type }}</td>
                    <td>{{ s.mode }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
