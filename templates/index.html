<!DOCTYPE html>
    <script>
        function navigate(delta){
            var d=new Date('{{ date }}');
            d.setDate(d.getDate()+delta);
            var y=d.getFullYear(),m=(d.getMonth()+1).toString().padStart(2,'0'),dd=d.getDate().toString().padStart(2,'0');
            window.location.href='/'+y+'-'+m+'-'+dd;
        }

        var editOverlay=document.getElementById('edit-overlay');
        var editPanel=document.getElementById('edit-panel');
        var editForm=document.getElementById('edit-form');
        var editTitle=document.getElementById('edit-panel-title');
        var efContent=document.getElementById('ef-content');
        var efDue=document.getElementById('ef-due');
        var efPriority=document.getElementById('ef-priority');
        var efCategory=document.getElementById('ef-category');
        var efTags=document.getElementById('ef-tags');
        var efNotes=document.getElementById('ef-notes');

        var taskData={
            {% for task in tasks %}
            '{{ task.id }}':{
                content:'{{ task.content|replace("'","\\'")|replace('"','\\"') }}',
                due_time:'{{ (task.due_time or '')|replace(' ','T') }}',
                priority:'{{ task.priority }}',
                category:'{{ task.category or '' }}',
                tags:'{{ task.tags or '' }}',
                notes:'{{ task.notes or '' }}'
            },
            {% endfor %}
        };

        function positionPanel(el){
            var pw=320,ph=340;
            var vw=window.innerWidth,vh=window.innerHeight;
            if(!el){
                editPanel.style.top='100px';
                editPanel.style.left=Math.max(10, Math.round(vw*0.12))+'px';
                editPanel.style.transform='none';
                return;
            }
            var r=el.getBoundingClientRect();
            var top = Math.round(r.bottom - 28);
            var left = Math.round(r.left + (r.width / 2) - (pw / 2) - 40);
            if(left < 10) left = Math.round(r.left + 8);
            if(left + pw > vw - 10) left = vw - pw - 10;
            if(top + ph > vh - 10) top = Math.max(10, vh - ph - 10);
            if(top < 10) top = 10;
            editPanel.style.left = left + 'px';
            editPanel.style.top = top + 'px';
            editPanel.style.transform = 'none';
        }

        function openEdit(id,e){
            var td=taskData[String(id)];
            if(!td) return;
            editForm.action='{{ url_for("edit", date=date, task_id=0) }}'.replace('/0','/'+id);
            efContent.value=td.content;
            efDue.value=td.due_time||'';
            efPriority.value=td.priority||'2';
            efCategory.value=td.category||'';
            efTags.value=td.tags||'';
            efNotes.value=td.notes||'';
            var row=document.getElementById('task-'+id);
            positionPanel(row);
            editOverlay.classList.add('active');
            if(row) row.classList.add('editing');
            setTimeout(function(){efContent.focus();efContent.select();},50);
        }

        function openNewEdit(e){
            editForm.action='{{ url_for("add", date=date) }}';
            efContent.value='';efDue.value='';efPriority.value='2';efCategory.value='';efTags.value='';efNotes.value='';
            positionPanel(document.getElementById('add-task-trigger'));
            editOverlay.classList.add('active');
            setTimeout(function(){efContent.focus();},50);
        }

        function closeEdit(){
            editOverlay.classList.remove('active');
            document.querySelectorAll('.task-row.editing').forEach(function(r){r.classList.remove('editing');});
        }

        document.getElementById('edit-backdrop').addEventListener('click', function(){ closeEdit(); });
        document.getElementById('edit-panel').addEventListener('click', function(e){ e.stopPropagation(); });

        function toggleHelp(){
            var p=document.getElementById('help-popover');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function toggleMediaWidget(){
            var w = document.getElementById('media-widget');
            if(!w) return;
            if(w.style.display === 'none' || getComputedStyle(w).display === 'none') w.style.display = 'block';
            else w.style.display = 'none';
        }

        document.addEventListener('click', function(e){
            var p=document.getElementById('help-popover');
            var btn=document.getElementById('help-btn');
            if(p.style.display === 'block' && !p.contains(e.target) && e.target !== btn) p.style.display = 'none';
        });

        var timerModes={pomodoro:25*60,short:5*60,long:15*60,custom:25*60};
        var timerLabels={pomodoro:'专注 25 分钟',short:'短休 5 分钟',long:'长休 15 分钟',custom:'自定义'};
        var currentMode='pomodoro';
        var totalSeconds=timerModes[currentMode];
        var remaining=totalSeconds;
        var timerInterval=null;
        var timerRunning=false;
        var displayEl=document.getElementById('ring-text');
        var startBtn=document.getElementById('timer-start');
        var ringFill=document.getElementById('ring-fill');
        var timerRing=document.getElementById('timer-ring');
        var timerCard=document.getElementById('timer-card');
        var playpauseIcon=document.getElementById('playpause-icon');
        var playpauseText=document.getElementById('playpause-text');
        var ringResetLeft = document.getElementById('ring-reset-left');
        var hideTimeCheckboxLeft = document.getElementById('hide-time-checkbox-left');

        function formatTime(s){var m=Math.floor(s/60),sec=s%60;return m.toString().padStart(2,'0')+':'+sec.toString().padStart(2,'0');}
        function updateRing(){}
        function renderTimer(){ if(displayEl) displayEl.textContent = formatTime(remaining); updateRing(); }

        function setMode(mode,btn){
            resetTimer();
            document.querySelectorAll('.timer-mode').forEach(function(b){b.classList.remove('active');});
            if(btn) btn.classList.add('active');
            currentMode = mode;
            if(mode === 'custom'){
                var v = prompt('输入分钟数:','25');
                var n = parseInt(v);
                if(!n || n < 1) return;
                timerModes.custom = n * 60;
                timerLabels.custom = '自定义 ' + n + ' 分钟';
            }
            totalSeconds = timerModes[mode];
            remaining = totalSeconds;
            renderTimer();
        }

        if(hideTimeCheckboxLeft){ hideTimeCheckboxLeft.addEventListener('change', function(){ if(hideTimeCheckboxLeft.checked) timerCard.classList.add('time-hidden'); else timerCard.classList.remove('time-hidden'); }); }

        function toggleTimer(){
            if(timerRunning){
                clearInterval(timerInterval); timerInterval = null; timerRunning = false;
                if(startBtn) startBtn.classList.remove('running'); if(startBtn) startBtn.textContent = '开始';
                if(timerRing) timerRing.classList.remove('running'); if(timerCard) timerCard.classList.remove('timer-active');
                if(playpauseIcon) playpauseIcon.innerHTML = '<path d="M6 4l12 8-12 8V4z" />'; if(playpauseText) playpauseText.textContent = '开始';
                return;
            }
            if(remaining <= 0) remaining = totalSeconds;
            timerRunning = true;
            if(startBtn) startBtn.classList.add('running'); if(startBtn) startBtn.textContent = '暂停';
            if(timerRing) timerRing.classList.add('running'); if(timerCard) timerCard.classList.add('timer-active');
            if(playpauseIcon) playpauseIcon.innerHTML = '<path d="M6 4h4v16H6zM14 4h4v16h-4z" />'; if(playpauseText) playpauseText.textContent = '暂停';
            timerInterval = setInterval(function(){ remaining -= 1; if(remaining <= 0){ clearInterval(timerInterval); timerInterval = null; timerRunning = false; if(startBtn) startBtn.classList.remove('running'); if(startBtn) startBtn.textContent = '开始'; if(timerRing) timerRing.classList.remove('running'); if(timerCard) timerCard.classList.remove('timer-active'); if(playpauseIcon) playpauseIcon.innerHTML = '<path d="M6 4l12 8-12 8V4z" />'; if(playpauseText) playpauseText.textContent = '开始'; remaining = 0; renderTimer(); setTimeout(function(){ remaining = totalSeconds; renderTimer(); }, 800); return; } renderTimer(); }, 1000);
        }

        function resetTimer(){ clearInterval(timerInterval); timerInterval = null; timerRunning = false; if(startBtn) startBtn.classList.remove('running'); if(startBtn) startBtn.textContent = '开始'; if(timerRing) timerRing.classList.remove('running'); remaining = totalSeconds; renderTimer(); }

        document.addEventListener('click', function(e){ var p=document.getElementById('help-popover'); var btn=document.getElementById('help-btn'); if(p.style.display === 'block' && !p.contains(e.target) && e.target !== btn) p.style.display = 'none'; });
        renderTimer();

        var isDragging = false; var offset = [0,0];
        function startDrag(e){ isDragging = true; var widget = document.getElementById('media-widget'); offset = [ widget.offsetLeft - e.clientX, widget.offsetTop - e.clientY ]; }
        document.addEventListener('mouseup', function(){ isDragging = false; });
        document.addEventListener('mousemove', function(e){ if(isDragging){ var widget = document.getElementById('media-widget'); widget.style.left = (e.clientX + offset[0]) + 'px'; widget.style.top = (e.clientY + offset[1]) + 'px'; widget.style.right = 'auto'; widget.style.bottom = 'auto'; } });

        var selectedMode='auto';
        var audioPlayer=document.getElementById('audio-player');
        var ytFrame=document.getElementById('yt-frame');
        var widgetVid=document.getElementById('widget-video');
        var vizBars=document.getElementById('viz-bars');
        var mediaHint=document.getElementById('media-hint');
        var btnAudio=document.getElementById('btn-audio');
        var btnYoutube=document.getElementById('btn-youtube');
        var btnVideo=document.getElementById('btn-video');

        function setMediaMode(mode){ selectedMode=mode; [btnAudio,btnYoutube,btnVideo].forEach(function(b){b.classList.remove('active');}); if(mode==='audio')btnAudio.classList.add('active'); else if(mode==='youtube')btnYoutube.classList.add('active'); else if(mode==='video')btnVideo.classList.add('active'); }
        btnAudio.addEventListener('click',function(){ setMediaMode('audio'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });
        btnYoutube.addEventListener('click',function(){ setMediaMode('youtube'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });
        btnVideo.addEventListener('click',function(){ setMediaMode('video'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });

        function clearMedia(){ audioPlayer.pause();audioPlayer.src='';audioPlayer.style.display='none'; ytFrame.src='';ytFrame.style.display='none'; try{widgetVid.pause();}catch(ex){} widgetVid.src=''; widgetVid.style.display='none'; vizBars.classList.remove('active'); document.getElementById('media-url').value=''; mediaHint.textContent='Y 键快速打开'; }
        document.getElementById('btn-clear').addEventListener('click',clearMedia);
        document.getElementById('media-url').addEventListener('change',handleMedia);
        document.getElementById('media-url').addEventListener('keydown',function(e){ if(e.key==='Enter') handleMedia(); });

        function handleMedia(){
            var url=(document.getElementById('media-url').value||'').trim();
            if(!url) return;
            var isAudio=url.match(/\.(mp3|wav|ogg|flac|aac)(\?.*)?$/i);
            var isVideo=url.match(/\.(mp4|webm|mov)(\?.*)?$/i);
            var isYT=url.includes('youtube.com/watch')||url.includes('youtu.be/');
            var mode=selectedMode;
            if(mode==='auto'){ if(isAudio) mode='audio'; else if(isYT) mode='youtube'; else if(isVideo) mode='video'; }
            clearMedia();
            if(mode==='audio'){ audioPlayer.src=url; audioPlayer.style.display='block'; audioPlayer.play(); vizBars.classList.add('active'); mediaHint.textContent='正在播放'; }
            else if(mode==='youtube' || isYT){ var vid=''; if(url.includes('youtu.be/')){ vid=url.split('youtu.be/')[1]; if(vid.includes('?')) vid=vid.split('?')[0]; } else if(url.includes('v=')){ vid=url.split('v=')[1]; if(vid.includes('&')) vid=vid.split('&')[0]; } if(vid){ ytFrame.src='https://www.youtube.com/embed/'+vid+'?autoplay=1'; } else { ytFrame.src=url; } ytFrame.style.display='block'; mediaHint.textContent='YouTube'; }
            else if(mode==='video'){ widgetVid.src=url; widgetVid.style.display='block'; try{ widgetVid.play(); }catch(ex){} mediaHint.textContent='视频'; }
        }

        function handleBgUpload(input){ if(!input.files||!input.files[0]) return; var file=input.files[0]; var type=file.type.split('/')[0]; var url=URL.createObjectURL(file); if(type==='video'){ var vid=document.getElementById('bg-video'); vid.src=url; vid.style.display='block'; document.body.style.backgroundImage='none'; } else { var reader=new FileReader(); reader.onload=function(e){ document.body.style.backgroundImage='url('+e.target.result+')'; document.body.style.backgroundSize='cover'; document.getElementById('bg-video').style.display='none'; }; reader.readAsDataURL(file); } }

        var themeToggle=document.getElementById('theme-toggle');
        var iconSun=document.getElementById('icon-sun');
        var iconMoon=document.getElementById('icon-moon');
        function applyTheme(t){ document.body.classList.toggle('dark-theme', t==='dark'); iconSun.style.display=(t==='dark')?'block':'none'; iconMoon.style.display=(t==='dark')?'none':'block'; }
        var storedTheme=localStorage.getItem('theme'); if(storedTheme) applyTheme(storedTheme);
        themeToggle.addEventListener('click', function(){ var now=document.body.classList.contains('dark-theme')?'light':'dark'; applyTheme(now); localStorage.setItem('theme', now); });

        document.addEventListener('keydown', function(e){ if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable) return; var k=e.key.toLowerCase(); if(k==='n'){ openNewEdit(null); } else if(k==='y'){ e.preventDefault(); e.stopPropagation(); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); setMediaMode('youtube'); var inp=document.getElementById('media-url'); inp && inp.focus(); } else if(k==='t'){ document.getElementById('timer-card').scrollIntoView({behavior:'smooth'}); } else if(k==='d'){ themeToggle.click(); } else if(k==='escape'){ closeEdit(); document.getElementById('help-popover').style.display='none'; } });
    </script>

        var vizBars=document.getElementById('viz-bars');
        var mediaHint=document.getElementById('media-hint');
        var btnAudio=document.getElementById('btn-audio');
        var btnYoutube=document.getElementById('btn-youtube');
        var btnVideo=document.getElementById('btn-video');

        function setMediaMode(mode){
            selectedMode=mode;
            [btnAudio,btnYoutube,btnVideo].forEach(function(b){b.classList.remove('active');});
            if(mode==='audio')btnAudio.classList.add('active');
            else if(mode==='youtube')btnYoutube.classList.add('active');
            else if(mode==='video')btnVideo.classList.add('active');
        }
        btnAudio.addEventListener('click',function(){ setMediaMode('audio'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });
        btnYoutube.addEventListener('click',function(){ setMediaMode('youtube'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });
        btnVideo.addEventListener('click',function(){ setMediaMode('video'); var w=document.getElementById('media-widget'); if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget(); });

        function clearMedia(){
            audioPlayer.pause();audioPlayer.src='';audioPlayer.style.display='none';
            ytFrame.src='';ytFrame.style.display='none';
            try{widgetVid.pause();}catch(ex){}widgetVid.src='';widgetVid.style.display='none';
            vizBars.classList.remove('active');
            document.getElementById('media-url').value='';
            mediaHint.textContent='Y 键快速打开';
        }
        document.getElementById('btn-clear').addEventListener('click',clearMedia);

        document.getElementById('media-url').addEventListener('change',handleMedia);
        document.getElementById('media-url').addEventListener('keydown',function(e){if(e.key==='Enter')handleMedia();});

        function handleMedia(){
            var url=(document.getElementById('media-url').value||'').trim();
            if(!url)return;
            var isAudio=url.match(/\.(mp3|wav|ogg|flac|aac)(\?.*)?$/i);
            var isVideo=url.match(/\.(mp4|webm|mov)(\?.*)?$/i);
            var isYT=url.includes('youtube.com/watch')||url.includes('youtu.be/');
            var mode=selectedMode;
            if(mode==='auto'){if(isAudio)mode='audio';else if(isYT)mode='youtube';else if(isVideo)mode='video';}
            clearMedia();
            if(mode==='audio'){
                audioPlayer.src=url;audioPlayer.style.display='block';audioPlayer.play();
                vizBars.classList.add('active');mediaHint.textContent='正在播放';
            }else if(mode==='youtube'||isYT){
                var vid='';
                if(url.includes('youtu.be/')){vid=url.split('youtu.be/')[1];if(vid.includes('?'))vid=vid.split('?')[0];}
                else if(url.includes('v=')){vid=url.split('v=')[1];if(vid.includes('&'))vid=vid.split('&')[0];}
                if(vid){ytFrame.src='https://www.youtube.com/embed/'+vid+'?autoplay=1';}
                else{ytFrame.src=url;}
                ytFrame.style.display='block';mediaHint.textContent='YouTube';
            }else if(mode==='video'){
                widgetVid.src=url;widgetVid.style.display='block';try{widgetVid.play();}catch(ex){}mediaHint.textContent='视频';
            }
        }

        function handleBgUpload(input){
            if(!input.files||!input.files[0])return;
            var file=input.files[0];
            var type=file.type.split('/')[0];
            var url=URL.createObjectURL(file);
            if(type==='video'){
                var vid=document.getElementById('bg-video');vid.src=url;vid.style.display='block';
                document.body.style.backgroundImage='none';
            }else{
                var reader=new FileReader();
                reader.onload=function(e){document.body.style.backgroundImage='url('+e.target.result+')';document.body.style.backgroundSize='cover';document.getElementById('bg-video').style.display='none';};
                reader.readAsDataURL(file);
            }
        }

        var themeToggle=document.getElementById('theme-toggle');
        var iconSun=document.getElementById('icon-sun');
        var iconMoon=document.getElementById('icon-moon');
        function applyTheme(t){
            document.body.classList.toggle('dark-theme',t==='dark');
            iconSun.style.display=(t==='dark')?'block':'none';
            iconMoon.style.display=(t==='dark')?'none':'block';
        }
        var storedTheme=localStorage.getItem('theme');
        if(storedTheme)applyTheme(storedTheme);
        themeToggle.addEventListener('click',function(){
            var now=document.body.classList.contains('dark-theme')?'light':'dark';
            applyTheme(now);localStorage.setItem('theme',now);
        });

        document.addEventListener('keydown',function(e){
            if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'||e.target.isContentEditable)return;
            var k=e.key.toLowerCase();
            if(k==='n'){openNewEdit(null);}
            else if(k==='y'){
                e.preventDefault();
                e.stopPropagation();
                var w=document.getElementById('media-widget');
                if(w && (getComputedStyle(w).display==='none' || w.style.display==='none')) toggleMediaWidget();
                setMediaMode('youtube');
                var inp = document.getElementById('media-url');
                inp && inp.focus();
            }
            else if(k==='t'){document.getElementById('timer-card').scrollIntoView({behavior:'smooth'});}
            else if(k==='d'){themeToggle.click();}
            else if(k==='escape'){closeEdit();document.getElementById('help-popover').style.display='none';}
        });
    </script>
</body>
</html>
